<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <title>Pokémon Trivia Game</title>
    
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', -apple-system, sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        #app {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .hidden { display: none !important; }

        .title-image {
            width: 120px;
            height: 120px;
            margin: 0 auto 10px auto;
            display: block;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 { color: #1e3a8a; font-size: 28px; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { color: #64748b; margin-bottom: 20px; font-size: 14px; font-weight: 700; }

        .menu-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 2px solid #e2e8f0;
        }

        .menu-box h3 { margin: 0 0 5px 0; color: #334155; font-size: 16px; }
        .menu-box p { font-size: 12px; color: #64748b; margin: 0 0 10px 0; }

        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .nav-btn { background: #e2e8f0; border: none; padding: 8px 12px; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 12px; }

        .stats { background: #f1f5f9; padding: 8px 15px; border-radius: 12px; margin-bottom: 15px; font-weight: 800; display: flex; justify-content: space-between; }

        #question-text { font-size: 18px; font-weight: 800; margin: 10px 0; }
        #pokemon-image { width: 180px; height: 180px; margin: 0 auto 10px auto; display: block; }
        
        .silhouette { filter: brightness(0); }
        .revealed { filter: brightness(1); transition: filter 0.5s; }

        .option-btn {
            display: block; width: 100%; padding: 12px; margin: 8px 0; font-family: 'Nunito'; font-weight: 800;
            border: 2px solid #cbd5e1; border-radius: 12px; background: white; cursor: pointer;
            box-shadow: 0 4px 0 #cbd5e1; transition: all 0.1s;
        }

        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0; }
        .correct { background: #22c55e !important; border-color: #16a34a !important; color: white !important; }
        .wrong { background: #ef4444 !important; border-color: #dc2626 !important; color: white !important; }

        .primary-btn {
            width: 100%; padding: 12px; border: none; border-radius: 12px; color: white;
            font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 8px;
        }
        .btn-blue { background: #3b82f6; }
        .btn-green { background: #10b981; }
        .btn-orange { background: #f59e0b; }
        .btn-purple { background: #8b5cf6; }
    </style>
</head>
<body>
    <div id="app">
        <div id="home-screen">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="title-image">
            <h1>POKÉMON TRIVIA</h1>
            <p class="subtitle">Choose your challenge!</p>
            <div class="menu-box"><h3>GUESS MODE</h3><button class="primary-btn btn-blue" onclick="startGame('GUESS')">Play Guess</button></div>
            <div class="menu-box"><h3>TYPES MODE</h3><button class="primary-btn btn-green" onclick="startGame('TYPES')">Play Types</button></div>
            <div class="menu-box"><h3>EVOLUTIONS</h3><button class="primary-btn btn-orange" onclick="startGame('EVOLUTIONS')">Play Evolutions</button></div>
            <div class="menu-box"><h3>TRIVIA</h3><button class="primary-btn btn-purple" onclick="startGame('TRIVIA')">Play Trivia</button></div>
        </div>

        <div id="game-screen" class="hidden">
            <div class="nav-bar">
                <button class="nav-btn" onclick="goHome()">HOME</button>
                <button class="nav-btn" onclick="restartGame()">RESET</button>
            </div>
            <div class="stats"><span>Q: <span id="question-count">1</span>/25</span><span>Score: <span id="score">0</span></span></div>
            <div id="game-content">
                <div id="question-text"></div>
                <img id="pokemon-image" src="" alt="Pokemon">
                <div id="options"></div>
            </div>
        </div>

        <div id="end-screen" class="hidden">
            <h1>Game Over!</h1>
            <p id="end-message"></p>
            <h2>Final Score: <span id="final-score">0</span>/25</h2>
            <button class="primary-btn btn-blue" onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        const TOTAL_QUESTIONS = 25;
        const MAX_POKEMON_ID = 898;
        const POKEMON_TYPES = ['normal', 'fire', 'water', 'grass', 'electric', 'ice', 'fighting', 'poison', 'ground', 'flying', 'psychic', 'bug', 'rock', 'ghost', 'dragon', 'dark', 'steel', 'fairy'];
        const REGIONS = {'generation-i': 'Kanto', 'generation-ii': 'Johto', 'generation-iii': 'Hoenn', 'generation-iv': 'Sinnoh', 'generation-v': 'Unova', 'generation-vi': 'Kalos', 'generation-vii': 'Alola', 'generation-viii': 'Galar', 'generation-ix': 'Paldea'};

        let currentMode = 'GUESS', currentQuestion = 0, score = 0, correctAnswersAttribute = '';

        function startGame(mode) {
            currentMode = mode; currentQuestion = 0; score = 0;
            document.getElementById('score').innerText = score;
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            loadNextQuestion();
        }

        function restartGame() { startGame(currentMode); }
        function goHome() { document.getElementById('game-screen').classList.add('hidden'); document.getElementById('home-screen').classList.remove('hidden'); }

        async function loadNextQuestion() {
            if (currentQuestion >= TOTAL_QUESTIONS) return endGame();
            const targetId = Math.floor(Math.random() * MAX_POKEMON_ID) + 1;
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${targetId}`);
            const main = await res.json();
            const img = document.getElementById('pokemon-image');
            img.src = main.sprites.other['official-artwork'].front_default;
            
            // Simplified Logic for demonstration
            currentQuestion++;
            document.getElementById('question-count').innerText = currentQuestion;
            document.getElementById('question-text').innerText = "What is this Pokémon?";
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            // Basic choice logic
            createButton(main.name, main.name, true);
            createButton("Wrong Answer", "wrong", false);
            // (Add more choices here as needed)
        }

        function createButton(text, val, isCorrect) {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = text;
            btn.onclick = () => {
                if (isCorrect) { btn.classList.add('correct'); score++; document.getElementById('score').innerText = score; }
                else { btn.classList.add('wrong'); }
                setTimeout(loadNextQuestion, 1000);
            };
            document.getElementById('options').appendChild(btn);
        }

        function endGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }
    </script>
</body>
</html>
